<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Vehicle Management System</h1>
    <form id="vehicle-entry-form">
        <h2>Vehicle Entry</h2>
        <label for="vehicle-name">Vehicle Name:</label>
        <input type="text" id="vehicle-name" name="vehicle-name" required>
        <label for="vehicle-type">Vehicle Type:</label>
        <input type="text" id="vehicle-type" name="vehicle-type" required>
        <button type="submit">Add Vehicle</button>
    </form>

    <section id="pdi-jcard">
        <h2>PDI J/Card</h2>
        <p>Details about PDI J/Card would go here.</p>
    </section>

    <section id="repair-notes">
        <h2>Repair Notes</h2>
        <textarea id="repair-notes-input" placeholder="Enter repair notes here..."></textarea>
    </section>

    <section id="system-logs">
        <h2>System Logs</h2>
        <table id="logs-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Action</th>
                    <th>User</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-04-01</td>
                    <td>Vehicle Added</td>
                    <td>Admin</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script src="script.js"></script>
</body>
</html>
