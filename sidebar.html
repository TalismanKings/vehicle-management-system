<!-- INVENTORY TAB -->
<section id="inventory" class="tab-content">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left: Search & Stock Control (Web View) -->
        <div class="lg:col-span-2 space-y-6">
            <div class="card p-6">
                <h3 class="font-bold text-slate-900 mb-4">Stock Master List</h3>
                <div class="relative mb-6">
                    <input type="text" placeholder="Search by Part Name or SKU..." class="w-full bg-slate-50 border border-slate-200 pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">

                </div>

        <div class="card bg-slate-900 text-white p-6 border-none shadow-2xl relative overflow-hidden">

                    <span class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                </div>

                <div class="aspect-[9/16] bg-slate-800 rounded-2xl border-2 border-white/20 flex flex-col items-center justify-center relative overflow-hidden">

                        <div class="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-blue-500 -mt-1 -mr-1"></div>

                        <div class="w-full h-0.5 bg-blue-500/50 shadow-[0_0_15px_#3b82f6] animate-bounce"></div>
